<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff — D5IO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-md">
  <div class="container">
    <a class="navbar-brand" href="../../index.html">D5IO</a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav"
            aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-md-3">
        <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="STAFF.html">Staff</a></li>
        <li class="nav-item"><a class="nav-link" href="SERVICES.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="PRODUCTS.html">Products</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container mt-4">
  <div class="page-head">
    <h1 class="mb-3" id="page-title">Our Team</h1>
    <p class="page-count" id="page-count"></p>
  </div>
  <div id="content"></div>
  <div class="mt-4" id="back-link" style="display:none;">
    <a href="STAFF.html" class="btn btn-outline-dark rounded-0">&larr; Back to all staff</a>
  </div>
</main>

<!-- Modal for full markdown view -->
<div class="modal fade" id="mdModal" tabindex="-1" aria-labelledby="mdModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content rounded-0">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="mdModalLabel">Content</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="mdModalBody">
        <!-- full markdown rendered here -->
      </div>
    </div>
  </div>
</div>

<footer class="container mt-5">
  <div class="d-flex justify-content-between flex-wrap gap-2">
    <span>D5IO</span>
    <span id="yr"></span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/load.js"></script>
<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const urlParams = new URLSearchParams(window.location.search);
  const member = urlParams.get('member');

  if (member) {
    document.getElementById('page-title').innerHTML = `${member.replace(/_/g, ' ')}`;
    document.getElementById('back-link').style.display = 'block';
    loadStaffDetail(member, document.getElementById('content'));
  } else {
    loadStaffIndex('../staff/manifest.json', '../staff/', document.getElementById('content'));
  }
</script>
</body>
</html>
